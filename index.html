<!DOCTYPE html>

    <link rel="stylesheet" href="./styles/styles.css">
    <title>Orbital Simulator 3D - Asteroids</title>
</head>
<body>

            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

        }
    </script>

    <script type="module" src="./src/main.js"></script>

</html>
